# Owner: HADI
[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["app/db/migrations/", "*.ipynb"]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501", "E402"]

[tool.ruff.lint.per-file-ignores]
"app/auth/*" = ["F401"]
"app/domain/*" = ["F401"]
"app/services/*" = ["F401"]
"app/repositories/*" = ["F401"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
