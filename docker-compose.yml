x-app-common: &app-common
  working_dir: /app
  volumes:
    - ./:/app
  environment:
    DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-password}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-app}
    REDIS_URL: redis://redis:${REDIS_PORT:-6379}/0
    VAULT_ADDR: http://vault:${VAULT_PORT:-8200}
    VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-root}
    MINIO_ENDPOINT: http://minio:${MINIO_PORT:-9000}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    MINIO_BUCKET_INCOMING: ${MINIO_BUCKET_INCOMING:-incoming}
    MINIO_BUCKET_OVERLAYS: ${MINIO_BUCKET_OVERLAYS:-overlays}
    SFTP_HOST: sftp
    SFTP_PORT: ${SFTP_PORT:-2222}

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123} &&
      mc mb -p local/${MINIO_BUCKET_INCOMING:-incoming} || true &&
      mc mb -p local/${MINIO_BUCKET_OVERLAYS:-overlays} || true
    restart: "no"

  vault-init:
    image: curlimages/curl:latest
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./docker/vault/init-vault.sh:/init-vault.sh:ro
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-jwt-signing-key}
    entrypoint: ["/bin/sh", "/init-vault.sh"]
    restart: "no"

  vault:
    image: hashicorp/vault:1.14.0
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-root}
    command: server -dev -dev-root-token-id=${VAULT_ROOT_TOKEN:-root} -dev-listen-address=0.0.0.0:8200
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 8

  sftp:
    image: atmoz/sftp:latest
    environment:
      SFTP_USERS: ${SFTP_USERS:-scanner:scanner:::upload}
    volumes:
      - sftp-data:/home
    ports:
      - "${SFTP_PORT:-2222}:22"
    healthcheck:
      test: ["CMD-SHELL", "pidof sshd >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    <<: *app-common
    command: ["/bin/sh", "-lc", "alembic upgrade head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    <<: *app-common
    command: ["/bin/sh", "-lc", "uvicorn app.main:app --host 0.0.0.0 --port ${API_PORT:-8000}"]
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    <<: *app-common
    command: ["/bin/sh", "-lc", "python -m app.workers.inference_worker"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
    restart: on-failure

  sftp-ingest:
    build:
      context: .
      dockerfile: docker/ingest.Dockerfile
    <<: *app-common
    command: ["/bin/sh", "-lc", "python -m app.workers.sftp_ingest_worker"]
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      sftp:
        condition: service_healthy
    restart: on-failure

volumes:
  db-data:
  redis-data:
  minio-data:
  sftp-data:

networks:
  default:
    name: docclf_appnet

# NOTES:
# - Copy `.env.example` to `.env` and set the Vault root token plus ports.
# - The stack now boots with a MinIO bucket bootstrap and explicit commands for API, workers,
#   and migrations, while keeping the full compose setup self-contained for local dev.
